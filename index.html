<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프리미엄 로또 번호 생성기</title>
    <meta name="description" content="글래스모피즘 디자인이 적용된 예쁜 로또 번호 생성기">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle" class="theme-toggle" aria-label="테마 변경">
        <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>
    <div class="container glass-panel">
        <h1 class="title">럭키 식스</h1>
        <p class="subtitle">오늘의 행운 번호를 뽑아보세요!</p>
        
        <div class="balls-container" id="balls-container">
            <div class="placeholder">버튼을 눌러 번호를 생성하세요</div>
        </div>
        
        <button id="generate-btn" class="generate-btn">
            <span class="btn-text">번호 생성하기</span>
            <div class="btn-glow"></div>
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
