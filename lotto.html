<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 번호 생성기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      color: #f5c518;
      letter-spacing: 2px;
    }

    p.sub {
      color: #aaa;
      margin-bottom: 36px;
      font-size: 0.9rem;
    }

    .tickets {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 480px;
    }

    .ticket {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 14px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      from { transform: scale(0.9); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .ticket-label {
      font-size: 0.75rem;
      color: #888;
      min-width: 18px;
      font-weight: bold;
    }

    .balls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .ball {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1rem;
      color: #fff;
      flex-shrink: 0;
    }

    /* 번호 색상 구간 */
    .c1  { background: radial-gradient(circle at 35% 35%, #ffd700, #b8860b); }
    .c2  { background: radial-gradient(circle at 35% 35%, #4fc3f7, #0277bd); }
    .c3  { background: radial-gradient(circle at 35% 35%, #ef5350, #b71c1c); }
    .c4  { background: radial-gradient(circle at 35% 35%, #9c7bd4, #6a1b9a); }
    .c5  { background: radial-gradient(circle at 35% 35%, #66bb6a, #2e7d32); }

    .controls {
      display: flex;
      gap: 12px;
      margin-top: 28px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .count-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #ccc;
      font-size: 0.9rem;
    }

    select {
      background: #0f3460;
      color: #eee;
      border: 1px solid #e94560;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    button {
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 1px;
    }

    button:hover  { background: #c73652; }
    button:active { transform: scale(0.97); }

    .btn-clear {
      background: #333;
    }
    .btn-clear:hover { background: #555; }
  </style>
</head>
<body>

<h1>🎰 로또 생성기</h1>
<p class="sub">1 ~ 45 중 6개 번호를 무작위로 추첨합니다</p>

<div class="controls">
  <div class="count-wrap">
    <label for="ticketCount">게임 수</label>
    <select id="ticketCount">
      <option value="1">1게임</option>
      <option value="3">3게임</option>
      <option value="5" selected>5게임</option>
      <option value="10">10게임</option>
    </select>
  </div>
  <button onclick="generate()">번호 생성</button>
  <button class="btn-clear" onclick="clear()">초기화</button>
</div>

<div class="tickets" id="tickets" style="margin-top:28px;"></div>

<script>
  function ballClass(n) {
    if (n <= 10) return 'c1';
    if (n <= 20) return 'c2';
    if (n <= 30) return 'c3';
    if (n <= 40) return 'c4';
    return 'c5';
  }

  function pickNumbers() {
    const pool = Array.from({length: 45}, (_, i) => i + 1);
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    return pool.slice(0, 6).sort((a, b) => a - b);
  }

  function generate() {
    const count = parseInt(document.getElementById('ticketCount').value);
    const container = document.getElementById('tickets');
    container.innerHTML = '';

    const labels = ['A','B','C','D','E','F','G','H','I','J'];

    for (let i = 0; i < count; i++) {
      const nums = pickNumbers();
      const ticket = document.createElement('div');
      ticket.className = 'ticket';
      ticket.style.animationDelay = `${i * 0.06}s`;

      const label = document.createElement('div');
      label.className = 'ticket-label';
      label.textContent = labels[i];

      const balls = document.createElement('div');
      balls.className = 'balls';

      nums.forEach(n => {
        const b = document.createElement('div');
        b.className = `ball ${ballClass(n)}`;
        b.textContent = n;
        balls.appendChild(b);
      });

      ticket.appendChild(label);
      ticket.appendChild(balls);
      container.appendChild(ticket);
    }
  }

  function clear() {
    document.getElementById('tickets').innerHTML = '';
  }

  // 초기 실행
  generate();
</script>
</body>
</html>
