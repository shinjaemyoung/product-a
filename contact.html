<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의하기 - 럭키 식스</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            width: 100%;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            text-align: left;
        }
        .form-group label {
            color: var(--text-primary);
            font-size: 0.9rem;
            font-weight: 600;
            padding-left: 0.5rem;
        }
        .form-group input, .form-group textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            width: 100%;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: #a855f7;
            background: rgba(255, 255, 255, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 120px;
        }
    </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-R78GYMXX8R"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-R78GYMXX8R');
</script>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">럭키 식스</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">홈</a>
            <a href="guide.html" class="nav-link">가이드</a>
            <a href="about.html" class="nav-link">소개</a>
            <a href="contact.html" class="nav-link">문의</a>
            <button id="theme-toggle" class="theme-toggle" aria-label="테마 변경">
                <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </nav>

    <div class="container glass-panel">
        <h1 class="title">문의하기</h1>
        <p class="subtitle">궁금한 점이 있으시면 메시지를 남겨주세요.</p>

        <form action="https://formspree.io/f/xqeyrndp" method="POST" class="contact-form">
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="email" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label for="message">메시지</label>
                <textarea id="message" name="message" placeholder="문의 내용을 입력해주세요." required></textarea>
            </div>
            <button type="submit" class="generate-btn">
                <span class="btn-text">보내기</span>
                <div class="btn-glow"></div>
            </button>
        </form>
    </div>

    <footer class="footer">
        <div class="footer-links">
            <a href="about.html" class="footer-link">소개</a>
            <a href="privacy.html" class="footer-link">개인정보처리방침</a>
            <a href="contact.html" class="footer-link">문의하기</a>
        </div>
        <p class="footer-copy">&copy; 2026 럭키 식스. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
